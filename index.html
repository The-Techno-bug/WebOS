<!DOCTYPE html>
<html>
<head>
    <title>Vega</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Cinzel">
    
</head>
<body>
    <div id="topbar">
        <h1><b class="glow">Vega</b></h1>
        <p id="timeElement">Time</p>
    </div>
    <div id="desktop">
        
    </div>
    <div id="welcomeWindow" class="window invisible">
        <div id="welcomeWindowheader" class="header">
            <div id="interactButtons">
                <div class="closeBtn" id="welcomeClose"></div>
                <div class="minimizeBtn" id="welcomeMinimize"></div>
                <div class="fullscreenBtn" id="welcomeFullscreen"></div>
            </div>
            <h3>Welcome</h3>
            <h3></h3>
        </div>
        <div><p>Welcome to <span class="font">Vega.</span></p></div>
    </div>
    <div id="notesWindow" class="window invisible">
        <div id="notesWindowheader" class="header">
            <div id="interactButtons">
                <div class="closeBtn" id="notesClose"></div>
                <div class="minimizeBtn" id="notesMinimize"></div>
                <div class="fullscreenBtn" id="notesFullscreen"></div>
            </div>
            <h3 class="glow">Notes</h3>
            <h3></h3>
        </div>
        <div class="notesapp">
            <div class="notes">
                <div class="topbar">
                    <h4 class="glow" contenteditable="True" id="topBarTitle">Welcome!</h4>
                </div>
                <div class="noteEditor">
                    <p contenteditable="True" id="noteText"></p>
                </div>
            </div>
            <div class="sidebar">
                <div class="selectedSidebarItem">
                    <h4 class="glow" contenteditable="True" id="sideBarTitle">Welcome!</h4>
                    <p id="dateElement"></p>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
